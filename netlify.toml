[build]
  command = "npm run build"
  publish = "public"

[[edge_functions]]
  function = "relay"
  path = "/*"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    CDN-Cache-Control = "public, max-age=31536000"
    X-Cache = "HIT"
    X-Cache-Hits = "999"
